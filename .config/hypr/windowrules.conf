# в–Ҳв–„в–„вҖғв–Ҳв–Җв–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–„вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–Ҳв–Ҳв–„вҖғв–„в–Ҳ

layerrule = blur on, match:namespace class:rofi
# layerrulev2 = ignorezero, class:rofi

layerrule = blur on, ignore_alpha 0, match:namespace class:notifications

layerrule = blur on, ignore_alpha 0, match:namespace class:swaync-notification-window

layerrule = blur on, ignore_alpha 0, match:namespace class:swaync-control-center

layerrule = blur on, match:namespace class:logout_dialog
